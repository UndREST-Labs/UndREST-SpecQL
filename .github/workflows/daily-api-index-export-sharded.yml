name: Daily API Index Export (Sharded)

on:
  schedule:
    # Run daily at 05:00 UTC
    - cron: '0 5 * * *'

  workflow_dispatch:
    inputs:
      source_config:
        description: 'Path to source config JSON (default: config/sources/azure.json)'
        required: false
        default: 'config/sources/azure.json'
      spec_scope:
        description: 'Subdirectory within the specs repo to export (default: specification)'
        required: false
        default: 'specification'

jobs:
  export-api-index-sharded:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout UndREST-SpecQL
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pyfiglet pytest

      - name: Resolve source config
        id: source
        run: |
          SOURCE_CONFIG="${{ github.event.inputs.source_config || 'config/sources/azure.json' }}"
          echo "config=${SOURCE_CONFIG}" >> "$GITHUB_OUTPUT"
          # Read fields from the source config for use in later steps
          SPECS_DIR=$(python3 -c "import json; cfg=json.load(open('${SOURCE_CONFIG}')); print(cfg.get('specs_dir','azure-rest-api-specs'))")
          SOURCE_REPO=$(python3 -c "import json; cfg=json.load(open('${SOURCE_CONFIG}')); print(cfg.get('source_repo','unknown'))")
          SOURCE_BRANCH=$(python3 -c "import json; cfg=json.load(open('${SOURCE_CONFIG}')); print(cfg.get('source_branch','main'))")
          echo "specs_dir=${SPECS_DIR}" >> "$GITHUB_OUTPUT"
          echo "source_repo=${SOURCE_REPO}" >> "$GITHUB_OUTPUT"
          echo "source_branch=${SOURCE_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Clone / update spec repository
        run: |
          python3 refresh_database.py \
            --source-config "${{ steps.source.outputs.config }}" \
            --all \
            --skip-db-build

      - name: Run API inventory export
        run: |
          SCOPE="${{ github.event.inputs.spec_scope || 'specification' }}"
          python3 scripts/export/export_api_inventory.py \
            --source "${{ steps.source.outputs.specs_dir }}/${SCOPE}" \
            --output-dir inventory/ \
            --source-repo "${{ steps.source.outputs.source_repo }}" \
            --source-branch "${{ steps.source.outputs.source_branch }}" \
            --sharded \
            --minified \
            --verbose

      - name: Run export pipeline tests
        run: |
          python3 -m pytest \
            tests/test_api_inventory_export.py \
            tests/test_api_inventory_normalization.py \
            -v

      - name: Publish shards to GitHub Release
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_REPO="${{ steps.source.outputs.source_repo }}"
          NOTES="Auto-updated sharded API index generated from \`${SOURCE_REPO}\`.
          Consumed by [UndREST-APISpy](https://github.com/UndREST-Labs/UndREST-APISpy) to keep extension shard data current."

          # Create release if it doesn't exist, then upload/overwrite assets
          if gh release view shards-latest > /dev/null 2>&1; then
            gh release upload shards-latest inventory/api-index-sharded-*.zip --clobber
          else
            gh release create shards-latest inventory/api-index-sharded-*.zip \
              --title "Latest API Shards" \
              --notes "$NOTES" \
              --latest
          fi

      - name: Trigger APISpy shard update
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.APISPY_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --fail-with-body \
            https://api.github.com/repos/UndREST-Labs/UndREST-APISpy/dispatches \
            -d '{
              "event_type": "speql-shards-updated",
              "client_payload": {
                "run_id": "${{ github.run_id }}",
                "tag": "shards-latest",
                "triggered_by": "${{ github.event_name }}"
              }
            }'

      - name: Upload inventory artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-index-sharded-${{ github.run_id }}
          path: inventory/
          retention-days: 30


name: Daily API Index Export

on:
  schedule:
    # Run daily at 04:00 UTC
    - cron: '0 4 * * *'

  workflow_dispatch:
    inputs:
      source_config:
        description: 'Path to source config JSON (default: config/sources/azure.json)'
        required: false
        default: 'config/sources/azure.json'
      spec_scope:
        description: 'Subdirectory within the specs repo to export (default: specification)'
        required: false
        default: 'specification'

jobs:
  export-api-index:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout UndREST-SpecQL
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pyfiglet pytest

      - name: Resolve source config
        id: source
        run: |
          SOURCE_CONFIG="${{ github.event.inputs.source_config || 'config/sources/azure.json' }}"
          echo "config=${SOURCE_CONFIG}" >> "$GITHUB_OUTPUT"
          SPECS_DIR=$(python3 -c "import json; cfg=json.load(open('${SOURCE_CONFIG}')); print(cfg.get('specs_dir','azure-rest-api-specs'))")
          SOURCE_REPO=$(python3 -c "import json; cfg=json.load(open('${SOURCE_CONFIG}')); print(cfg.get('source_repo','unknown'))")
          SOURCE_BRANCH=$(python3 -c "import json; cfg=json.load(open('${SOURCE_CONFIG}')); print(cfg.get('source_branch','main'))")
          echo "specs_dir=${SPECS_DIR}" >> "$GITHUB_OUTPUT"
          echo "source_repo=${SOURCE_REPO}" >> "$GITHUB_OUTPUT"
          echo "source_branch=${SOURCE_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Clone / update spec repository
        run: |
          python3 refresh_database.py \
            --source-config "${{ steps.source.outputs.config }}" \
            --all \
            --skip-db-build

      - name: Run API inventory export
        run: |
          SCOPE="${{ github.event.inputs.spec_scope || 'specification' }}"
          python3 scripts/export/export_api_inventory.py \
            --source "${{ steps.source.outputs.specs_dir }}/${SCOPE}" \
            --output-dir inventory/ \
            --source-repo "${{ steps.source.outputs.source_repo }}" \
            --source-branch "${{ steps.source.outputs.source_branch }}" \
            --grouped \
            --minified \
            --verbose

      - name: Run export pipeline tests
        run: |
          python3 -m pytest \
            tests/test_api_inventory_export.py \
            tests/test_api_inventory_normalization.py \
            -v

      - name: Upload inventory artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-index-${{ github.run_id }}
          path: inventory/
          retention-days: 30


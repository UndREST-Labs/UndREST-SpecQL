name: SpeQL Security Scan

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'

  workflow_dispatch:
    inputs:
      source_config:
        description: 'Path to source config JSON (default: config/sources/azure.json)'
        required: false
        default: 'config/sources/azure.json'
      spec_scope:
        description: 'Subdirectory within the specs repo to scan (default: specification/logic)'
        required: false
        default: 'specification'

jobs:
  speql-security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout UndREST-SpecQL
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          pip install pyfiglet pytest

      - name: Install CodeQL CLI
        run: |
          CODEQL_VERSION="v2.20.2"
          curl -fsSL \
            "https://github.com/github/codeql-cli-binaries/releases/download/${CODEQL_VERSION}/codeql-linux64.zip" \
            -o /tmp/codeql.zip
          unzip -q /tmp/codeql.zip -d /tmp/codeql-dist
          echo "/tmp/codeql-dist/codeql" >> "$GITHUB_PATH"

      - name: Install CodeQL JavaScript pack
        run: |
          export CODEQL_ALLOW_INSTALLATION_ANYWHERE=true
          codeql pack install queries/azure-security/

      - name: Resolve source config
        id: source
        run: |
          SOURCE_CONFIG="${{ github.event.inputs.source_config || 'config/sources/azure.json' }}"
          echo "config=${SOURCE_CONFIG}" >> "$GITHUB_OUTPUT"
          SPECS_DIR=$(python3 -c "import json; cfg=json.load(open('${SOURCE_CONFIG}')); print(cfg.get('specs_dir','azure-rest-api-specs'))")
          DATABASE_DIR=$(python3 -c "import json; cfg=json.load(open('${SOURCE_CONFIG}')); print(cfg.get('database_dir','database/azure-api-db'))")
          echo "specs_dir=${SPECS_DIR}" >> "$GITHUB_OUTPUT"
          echo "database_dir=${DATABASE_DIR}" >> "$GITHUB_OUTPUT"

      - name: Clone / update spec repository
        run: |
          python3 refresh_database.py \
            --source-config "${{ steps.source.outputs.config }}" \
            --all \
            --skip-db-build

      - name: Create CodeQL database
        run: |
          export CODEQL_ALLOW_INSTALLATION_ANYWHERE=true
          SCOPE="${{ github.event.inputs.spec_scope || 'specification/logic' }}"
          DATABASE_DIR="${{ steps.source.outputs.database_dir }}"
          SPECS_DIR="${{ steps.source.outputs.specs_dir }}"
          mkdir -p "$(dirname "${DATABASE_DIR}")"
          codeql database create "${DATABASE_DIR}" \
            --language=javascript \
            --source-root="${SPECS_DIR}/${SCOPE}" \
            --overwrite

      - name: Run SpeQL security queries
        run: |
          export CODEQL_ALLOW_INSTALLATION_ANYWHERE=true
          bash run-queries.sh --source-config "${{ steps.source.outputs.config }}" || true

      - name: Run SARIF analysis scripts
        if: always()
        run: |
          mkdir -p analysis-output
          for sarif in results/*.sarif; do
            [ -f "$sarif" ] || continue
            name=$(basename "$sarif" .sarif)

            bash scripts/sarif-analysis/parse-sarif-endpoints.sh \
              -f csv -o "analysis-output/${name}-endpoints.csv" "$sarif" || true

            bash scripts/sarif-analysis/prioritize-threats.sh \
              -f markdown -o "analysis-output/${name}-threats.md" "$sarif" || true

            bash scripts/sarif-analysis/deduplicate-by-product-operation.sh \
              -f summary -o "analysis-output/${name}-deduplicated.txt" "$sarif" || true
          done

          # Consolidate all unique deduplicated patterns into a single file
          if ls analysis-output/*-deduplicated.txt > /dev/null 2>&1; then
            sort -u analysis-output/*-deduplicated.txt > analysis-output/all-unique-patterns.txt || true
          fi

      - name: Upload query results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: speql-results-${{ github.run_id }}
          path: results/
          retention-days: 30

      - name: Upload SARIF analysis results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: speql-sarif-analysis-${{ github.run_id }}
          path: analysis-output/
          retention-days: 30

